function pgReports(con,acts){
  acts.innerHTML=`<button class="btn btn-secondary" onclick="exportJobsCSV()">↓ Export CSV</button>`;
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({label:d.toLocaleDateString('en-ZA',{month:'short',year:'2-digit'}),y:d.getFullYear(),m:d.getMonth()});}

  const mRev=months.map(mo=>DB.jobs.filter(j=>j.completedAt&&new Date(j.completedAt+'T12:00').getFullYear()===mo.y&&new Date(j.completedAt+'T12:00').getMonth()===mo.m).reduce((s,j)=>s+Number(j.value),0));
  const mJobs=months.map(mo=>DB.jobs.filter(j=>j.completedAt&&new Date(j.completedAt+'T12:00').getFullYear()===mo.y&&new Date(j.completedAt+'T12:00').getMonth()===mo.m).length);
  const maxRev=Math.max(...mRev,1);

  // Client map
  const clientMap={};
  DB.jobs.forEach(j=>{if(!clientMap[j.company])clientMap[j.company]={jobs:0,value:0};clientMap[j.company].jobs++;clientMap[j.company].value+=Number(j.value);});
  const topClients=Object.entries(clientMap).sort((a,b)=>b[1].value-a[1].value).slice(0,8);
  const maxCV=topClients.length?topClients[0][1].value:1;

  // Category breakdown
  const catMap={};DB.jobs.forEach(j=>{catMap[j.category]=(catMap[j.category]||0)+1;});
  const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,7);

  // Stage duration averages
  const avgDays=STAGES.slice(0,3).map(s=>{
    const diffs=DB.jobs.filter(j=>STAGES.indexOf(j.stage)>STAGES.indexOf(s)&&(j.stageHistory||[]).length>1).map(j=>{
      const e=(j.stageHistory||[]).find(h=>h.stage===s);
      const n=(j.stageHistory||[]).find(h=>STAGES.indexOf(h.stage)===STAGES.indexOf(s)+1);
      if(!e||!n)return null;
      return Math.max(0,Math.round((new Date(n.at)-new Date(e.at))/86400000));
    }).filter(d=>d!==null);
    return diffs.length?Math.round(diffs.reduce((a,b)=>a+b,0)/diffs.length):0;
  });

  const done=DB.jobs.filter(j=>j.stage==='complete');
  const totalRev=done.reduce((s,j)=>s+Number(j.value),0);
  const totalHrs=DB.jobs.reduce((s,j)=>s+(j.timesheet||[]).reduce((a,t)=>a+Number(t.hours),0),0);
  const avgVal=done.length?Math.round(totalRev/done.length):0;
  const wTot=DB.wastage.reduce((s,w)=>s+Number(w.cost),0);
  const sColors={design:'var(--accent)',printing:'var(--blue)',finishing:'var(--amber)',complete:'var(--green)'};

  con.innerHTML=`
  <div class="stat-grid sg-4">
    <div class="stat-card sc-green"><div class="stat-lbl">Total Revenue</div><div class="stat-val" style="font-size:20px;">${fmtMoney(totalRev)}</div><div class="stat-sub">${done.length} completed jobs</div><div class="stat-icon">◈</div></div>
    <div class="stat-card sc-blue"><div class="stat-lbl">Avg Job Value</div><div class="stat-val" style="font-size:20px;">${fmtMoney(avgVal)}</div><div class="stat-sub">per completed job</div><div class="stat-icon">⟶</div></div>
    <div class="stat-card sc-accent"><div class="stat-lbl">Hours Logged</div><div class="stat-val">${totalHrs}h</div><div class="stat-sub">all jobs combined</div><div class="stat-icon">◱</div></div>
    <div class="stat-card sc-red"><div class="stat-lbl">Total Wastage</div><div class="stat-val" style="font-size:20px;">${fmtMoney(wTot)}</div><div class="stat-sub">${DB.wastage.length} incidents</div><div class="stat-icon">△</div></div>
  </div>

  <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px;">
    <!-- Revenue Bar Chart -->
    <div class="card">
      <div class="card-hd"><span class="card-title">Monthly Revenue — Last 6 Months</span></div>
      <div style="padding:18px;">
        <div style="display:flex;align-items:flex-end;gap:8px;height:140px;margin-bottom:12px;">
          ${mRev.map((v,i)=>{
            const h=maxRev>0?Math.max(Math.round(v/maxRev*100),v>0?5:1):1;
            return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;">
              <div style="font-size:9px;color:var(--text3);font-family:var(--mono);text-align:center;white-space:nowrap;">${v>0?fmtMoney(v):''}</div>
              <div style="width:100%;height:${h}%;background:linear-gradient(180deg,var(--accent) 0%,#FF8555 100%);border-radius:4px 4px 0 0;min-height:${v>0?4:1}px;transition:height .5s ease;"></div>
              <div style="font-size:9px;color:var(--text3);white-space:nowrap;">${months[i].label}</div>
            </div>`;}).join('')}
        </div>
        <div style="display:flex;border-top:1px solid var(--border);padding-top:10px;gap:8px;">
          ${months.map((mo,i)=>`<div style="flex:1;text-align:center;"><div style="font-size:12px;font-weight:700;color:var(--text);">${mJobs[i]}</div><div style="font-size:9px;color:var(--text3);">jobs</div></div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Category breakdown -->
    <div class="card">
      <div class="card-hd"><span class="card-title">Jobs by Category</span></div>

// ─────────────────────────────────────────────
// CLIENT BOOK / CRM
// ─────────────────────────────────────────────
function buildClientBook(){
  const map={};
  DB.jobs.forEach(j=>{
    const k=j.company.trim();
    if(!map[k])map[k]={name:k,contact:j.contact||'',email:j.email||'',phone:'',jobs:[],totalValue:0,lastJob:null};
    map[k].jobs.push(j);
    map[k].totalValue+=Number(j.value);
    if(!map[k].lastJob||j.createdAt>map[k].lastJob)map[k].lastJob=j.createdAt;
    if(!map[k].email&&j.email)map[k].email=j.email;
  });
  DB.leads.forEach(l=>{
    const k=l.company.trim();
    if(!map[k])map[k]={name:k,contact:l.contact||'',email:l.email||'',phone:l.phone||'',jobs:[],totalValue:0,lastJob:null,leadOnly:true};
    if(!map[k].email&&l.email)map[k].email=l.email;
    if(!map[k].contact&&l.contact)map[k].contact=l.contact;
    if(!map[k].phone&&l.phone)map[k].phone=l.phone;
  });
  return Object.values(map).sort((a,b)=>b.totalValue-a.totalValue);
}

    c.name.toLowerCase().includes(srch)||
    (c.email||'').toLowerCase().includes(srch)||
    (c.contact||'').toLowerCase().includes(srch)):clients;
  const totalRev=clients.reduce((s,c)=>s+c.totalValue,0);
  const activeC=clients.filter(c=>c.jobs.some(j=>j.stage!=='complete'&&!j.archivedAt)).length;

  con.innerHTML=`
  <div class="stat-grid sg-3">
    <div class="stat-card sc-blue"><div class="stat-lbl">Total Clients</div><div class="stat-val">${clients.length}</div><div class="stat-sub">from jobs &amp; leads</div><div class="stat-icon">◎</div></div>
    <div class="stat-card sc-amber"><div class="stat-lbl">Active Now</div><div class="stat-val">${activeC}</div><div class="stat-sub">with active jobs</div><div class="stat-icon">◱</div></div>
    <div class="stat-card sc-green"><div class="stat-lbl">Total Billed</div><div class="stat-val" style="font-size:20px;">${fmtMoney(totalRev)}</div><div class="stat-sub">across all jobs</div><div class="stat-icon">◈</div></div>
  </div>

  <div class="card">
    <div class="card-hd">
      <span class="card-title">Client Book <span style="font-weight:400;color:var(--text3);font-size:12px;">(${filtered.length} of ${clients.length})</span></span>
      <div style="position:relative;">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;">⌕</span>
        <input type="text" placeholder="Search clients…" id="client-srch" value="${srch}" oninput="window._clientSearch=this.value;pgClients(document.getElementById('content'),document.getElementById('tb-actions'))" style="padding-left:30px;width:220px;">
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Company</th><th>Contact</th><th>Email</th><th>Jobs</th><th>Active</th><th>Total Billed</th><th>Last Job</th><th></th></tr></thead>
        <tbody>
          ${filtered.length?filtered.map(c=>{
            const active=c.jobs.filter(j=>j.stage!=='complete'&&!j.archivedAt);
            return`<tr style="cursor:pointer;" onclick="openClientDetail('${encodeURIComponent(c.name)}')">
              <td>
                <div style="font-weight:600;">${c.name}</div>
                ${c.leadOnly?`<span class="badge b-cold" style="font-size:9px;margin-top:3px;">Lead only</span>`:''}
              </td>
              <td style="color:var(--text2);">${c.contact||'—'}</td>
              <td style="color:var(--text2);font-size:12px;">${c.email||'—'}</td>
              <td style="font-family:var(--mono);font-size:13px;">${c.jobs.length}</td>
              <td>${active.length>0?`<span style="font-weight:700;color:var(--green);">${active.length}</span>`:'<span style="color:var(--text3);">—</span>'}</td>
              <td style="font-family:var(--mono);">${fmtMoney(c.totalValue)}</td>
              <td style="color:var(--text2);">${fmtDate(c.lastJob)}</td>
              <td onclick="event.stopPropagation();"><button class="btn btn-sm btn-secondary" onclick="openClientDetail('${encodeURIComponent(c.name)}')">View</button></td>
            </tr>`;}).join(''):'<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3);">No clients yet. Add leads or jobs to populate the client book.</td></tr>'}
        </tbody>
      </table>

function openClientDetail(enc){
  const name=decodeURIComponent(enc);
  const c=buildClientBook().find(x=>x.name===name);
  if(!c){openMo('Error','<div class="alert al-danger">Client not found.</div>','<button class="btn btn-primary" onclick="closeMo()">OK</button>');return;}
  const active=c.jobs.filter(j=>j.stage!=='complete'&&!j.archivedAt);
  const done=c.jobs.filter(j=>j.stage==='complete');
  const totalHrs=c.jobs.reduce((s,j)=>s+(j.timesheet||[]).reduce((a,t)=>a+Number(t.hours),0),0);
  const cats=[...new Set(c.jobs.map(j=>j.category))];

  openMo(`Client — ${c.name}`,`
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;">
    <div class="client-stat"><div class="cv">${c.jobs.length}</div><div class="cl">Total Jobs</div></div>
    <div class="client-stat"><div class="cv" style="color:var(--green);">${active.length}</div><div class="cl">Active</div></div>
    <div class="client-stat"><div class="cv">${done.length}</div><div class="cl">Completed</div></div>
    <div class="client-stat"><div class="cv" style="font-size:14px;">${fmtMoney(c.totalValue)}</div><div class="cl">Total Billed</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
    <div><label>Contact</label><p style="font-weight:600;">${c.contact||'—'}</p></div>
    <div><label>Email</label><p style="font-weight:600;">${c.email||'—'}</p></div>
    <div><label>Phone</label><p style="font-weight:600;">${c.phone||'—'}</p></div>
  </div>

  ${cats.length?`<div style="margin-bottom:14px;"><label>Categories</label><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">${cats.map(c=>`<span class="tag">${c}</span>`).join('')}</div></div>`:''}
  ${totalHrs>0?`<div style="margin-bottom:14px;"><label>Total Hours Logged</label><p style="font-weight:600;font-family:var(--mono);">${totalHrs}h</p></div>`:''}

  <div class="section-divider">Job History</div>
  ${c.jobs.length?c.jobs.slice().reverse().map(j=>`
  <div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="closeMo();openJobDetail('${j.id}')">
    <span style="font-family:var(--mono);font-size:11px;color:var(--text3);min-width:80px;">${j.id}</span>
    <div style="flex:1;">
      <div style="font-weight:600;font-size:13px;">${j.category}</div>
      <div style="font-size:11px;color:var(--text2);">${fmtDate(j.createdAt)} · Due ${fmtDate(j.dueDate)}</div>
    </div>
    ${sBadge(j.stage)}
    <span style="font-family:var(--mono);font-size:13px;font-weight:600;">${fmtMoney(j.value)}</span>
  </div>`).join(''):'<div style="padding:20px;text-align:center;color:var(--text3);">No jobs yet.</div>'}`,
  `<button class="btn btn-secondary" onclick="closeMo()">Close</button>
   <button class="btn btn-primary" onclick="closeMo();openAddJob()">+ New Job for this Client</button>`,'mo-lg');
}

function exportClientsCSV(){
  const clients=buildClientBook();
  dlCSV([
    ['Company','Contact','Email','Phone','Total Jobs','Completed','Active','Total Billed','Last Job'],
    ...clients.map(c=>[c.name,c.contact||'',c.email||'',c.phone||'',c.jobs.length,c.jobs.filter(j=>j.stage==='complete').length,c.jobs.filter(j=>j.stage!=='complete'&&!j.archivedAt).length,c.totalValue,c.lastJob||''])
  ],'Clients_'+today()+'.csv');
  auditLog('Exported Clients CSV');
}

// ─────────────────────────────────────────────
// BULK JOB OPERATIONS
// ─────────────────────────────────────────────
let _selJobs=new Set();
function toggleJobSel(jId,checked){if(checked)_selJobs.add(jId);else _selJobs.delete(jId);updateBulkBar();}
function updateBulkBar(){
  const bar=document.getElementById('bulk-bar');if(!bar)return;
  if(_selJobs.size>0){bar.classList.remove('hidden');const cnt=document.getElementById('bulk-count');if(cnt)cnt.textContent=`${_selJobs.size} job${_selJobs.size>1?'s':''} selected`;}
  else bar.classList.add('hidden');
}
function bulkAdvance(){
  if(!_selJobs.size)return;let n=0;
  _selJobs.forEach(jId=>{const j=DB.jobs.find(x=>x.id===jId);if(!j||j.stage==='complete')return;const si=STAGES.indexOf(j.stage);if(si===2&&!j.finishingChecklist.every(c=>c.done))return;j.stage=STAGES[si+1];j.stageHistory.push({stage:j.stage,at:today()});if(j.stage==='complete')j.completedAt=today();n++;});
  _selJobs.clear();saveDB();updateBadges();
  openMo('Done',`<div class="alert al-success">${n} job${n!==1?'s were':' was'} advanced.</div>`,`<button class="btn btn-primary" onclick="closeMo();renderPage()">OK</button>`);
}
function bulkAssign(){
  if(!_selJobs.size)return;
  openMo('Bulk Assign',`<div class="fg"><label>Assign selected jobs to</label>${uSel('bulk-as','')}</div>`,`<button class="btn btn-secondary" onclick="closeMo()">Cancel</button><button class="btn btn-primary" onclick="doBulkAssign()">Assign</button>`);
}
function doBulkAssign(){
  const uid=Number(document.querySelector('[name="bulk-as"]')?.value);if(!uid)return;
  _selJobs.forEach(jId=>{const j=DB.jobs.find(x=>x.id===jId);if(j&&!j.assignees.includes(uid))j.assignees.push(uid);});
  _selJobs.clear();saveDB();closeMo();renderPage();
}
function bulkPriority(p){if(!p)return;_selJobs.forEach(jId=>{const j=DB.jobs.find(x=>x.id===jId);if(j)j.priority=p;});_selJobs.clear();saveDB();renderPage();}
function clearBulkSel(){_selJobs.clear();renderPage();}

// BACKUP & FILE SIZE
// ─────────────────────────────────────────────
const MAX_DOC_MB=8;
function checkDocSize(file){
  if(file.size>MAX_DOC_MB*1024*1024){
    openMo('File Too Large',`<div class="alert al-danger">This file is ${(file.size/1024/1024).toFixed(1)} MB. Maximum is ${MAX_DOC_MB} MB. Please compress and retry.</div>`,`<button class="btn btn-primary" onclick="closeMo()">OK</button>`);
    return false;
  }
  const totalDocs=DB.jobs.reduce((s,j)=>s+(j.documents||[]).reduce((a,d)=>a+(d.size||0),0),0);
  if(totalDocs>50*1024*1024){
    showToast('Storage Warning','Total documents exceed 50 MB. Consider exporting a backup and clearing old files.','💾');
  }
  return true;
}
function recordBackup(){try{localStorage.setItem('pf_last_backup',new Date().toISOString());}catch(e){}}

// LOGIN SYSTEM
// ─────────────────────────────────────────────
function initLogin(){
  const n=document.getElementById('sys-name');if(n)n.textContent=DB.settings?.systemName||'PrintFlow';
  const ln=document.getElementById('login-sys-name');if(ln)ln.textContent=DB.settings?.systemName||'PrintFlow';
  const ul=document.getElementById('login-user-list');
  if(ul)ul.innerHTML=DB.users.filter(u=>u.active).map(u=>`<button class="login-user-btn" onclick="quickLogin(${u.id})">${av(u.id,30)}<div style="text-align:left;"><div style="font-weight:600;">${u.name}</div><div style="font-size:11px;color:var(--text3);">${u.role}</div></div>${u.role==='Super Admin'?'<span style="margin-left:auto;font-size:10px;color:var(--accent);">⬡ SA</span>':''}</button>`).join('');
}

function doLogin(){
  const name=document.getElementById('login-name').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  if(!name||!pass){err.textContent='Please enter name and password.';return;}
  const u=DB.users.find(u=>u.name.toLowerCase()===name.toLowerCase());
  if(!u){err.textContent='User not found.';return;}
  if(!u.active){err.textContent='Account is disabled.';return;}
  if(u.password&&u.password!==pass){err.textContent='Incorrect password.';return;}
  loginAs(u.id);
}

function quickLogin(uid){loginAs(uid);}

function loginAs(uid){
  const u=getUser(uid);DB.currentUser=uid;u.lastLogin=nowStr();
  auditLog('Login: '+u.name);saveDB();
  document.getElementById('login-screen').style.display='none';
  updateBadges();renderPage();
}

function logout(){
  auditLog('Logout: '+getUser(DB.currentUser).name);saveDB();
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').textContent='';
  initLogin();
}

// ─────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────
function applyTheme(mode){
  const html=document.documentElement;
  if(mode==='light'){html.classList.add('light');html.style.colorScheme='light';}
  else{html.classList.remove('light');html.style.colorScheme='dark';}
  const dk=document.getElementById('tt-dark'),lt=document.getElementById('tt-light');
  if(dk)dk.className='theme-toggle-opt'+(mode==='dark'?' active':'');
  if(lt)lt.className='theme-toggle-opt'+(mode==='light'?' active':'');
  try{localStorage.setItem('pf_theme',mode);}catch(e){}
}
function toggleTheme(){
  const current=document.documentElement.classList.contains('light')?'light':'dark';
  applyTheme(current==='dark'?'light':'dark');
}
function initTheme(){
  let mode='dark';
  try{const saved=localStorage.getItem('pf_theme');if(saved)mode=saved;}catch(e){}
  applyTheme(mode);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
initTheme();
initLogin();
</script>
